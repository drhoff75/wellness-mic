<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wellness Tracker - Voice Input</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa; color: #1a1a2e;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .container {
      background: white; border-radius: 20px; padding: 24px;
      width: 100%; max-width: 400px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); text-align: center;
    }
    h1 { font-size: 20px; margin-bottom: 16px; color: #1a1a2e; }
    .meal-selector { display: flex; gap: 4px; margin-bottom: 16px; }
    .meal-btn {
      flex: 1; padding: 8px 2px; border: 2px solid #e8ecf1; border-radius: 8px;
      background: white; font-size: 12px; font-weight: 500; cursor: pointer; color: #555;
    }
    .meal-btn.active { background: #3b82f6; border-color: #3b82f6; color: white; }

    .mic-btn {
      width: 80px; height: 80px; border-radius: 50%; border: none; background: #3b82f6;
      color: white; font-size: 32px; cursor: pointer; margin: 16px auto;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .mic-btn.recording { background: #ef4444; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

    .timer { font-size: 14px; color: #888; margin-bottom: 8px; min-height: 20px; }

    .transcript-area { margin: 12px 0; }
    .transcript-input {
      width: 100%; min-height: 60px; padding: 12px;
      background: #f8f9fb; border: 2px solid #e8ecf1; border-radius: 10px;
      font-size: 16px; color: #333; text-align: left; resize: vertical;
      font-family: inherit; outline: none;
    }
    .transcript-input:focus { border-color: #3b82f6; }
    .transcript-input::placeholder { color: #aaa; text-align: center; }

    .match-banner {
      display: none; padding: 8px 12px; background: #f0fdf4; border: 2px solid #22c55e;
      border-radius: 8px; margin: 8px 0; text-align: left; font-size: 14px; cursor: pointer;
    }
    .match-banner .match-name { font-weight: 600; }
    .match-banner .match-cal { color: #22c55e; font-weight: 600; float: right; }
    .match-banner .match-hint { font-size: 11px; color: #888; display: block; margin-top: 2px; }

    .status { font-size: 13px; min-height: 20px; margin: 8px 0; }
    .status.processing { color: #3b82f6; }
    .status.error { color: #ef4444; }
    .status.success { color: #22c55e; }

    .btn-submit {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      background: #22c55e; color: white; font-size: 16px; font-weight: 600;
      cursor: pointer; margin-top: 8px;
    }
    .btn-submit:hover { background: #16a34a; }
    .btn-submit:disabled { background: #ccc; cursor: not-allowed; }

    .btn-back {
      display: inline-block; margin-top: 16px; color: #3b82f6;
      text-decoration: none; font-size: 14px;
    }

    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid #e8ecf1; border-top-color: #3b82f6;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .result-items { text-align: left; margin-top: 12px; }
    .result-item {
      padding: 8px 10px; background: #f0fdf4; border-radius: 8px;
      margin-bottom: 4px; display: flex; justify-content: space-between; font-size: 14px;
    }
    .result-item .cal { color: #22c55e; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Voice Input</h1>

    <div class="meal-selector">
      <button class="meal-btn active" onclick="selectMeal(this, 'Breakfast')">Breakfast</button>
      <button class="meal-btn" onclick="selectMeal(this, 'Lunch')">Lunch</button>
      <button class="meal-btn" onclick="selectMeal(this, 'Snack')">Snack</button>
      <button class="meal-btn" onclick="selectMeal(this, 'Dinner')">Dinner</button>
    </div>

    <button class="mic-btn" id="mic-btn" onclick="toggleMic()">&#127908;</button>
    <div class="timer" id="timer">Tap to start recording (up to 30 sec)</div>

    <div class="transcript-area">
      <textarea class="transcript-input" id="transcript" placeholder="Your transcript will appear here. You can also type directly..." rows="3" oninput="onTranscriptChange()"></textarea>
    </div>

    <div class="match-banner" id="match-banner" onclick="useMatch()">
      <span class="match-name" id="match-name"></span>
      <span class="match-cal" id="match-cal"></span>
      <span class="match-hint">Tap to use this (no API cost)</span>
    </div>

    <div class="status" id="status"></div>

    <button class="btn-submit" id="submit-btn" onclick="submitVoice()" disabled>Log Food</button>

    <div id="result"></div>

    <a class="btn-back" href="https://script.google.com/macros/s/AKfycbxQbfZzReuSn-amJWbroWaMH6TBWBDP0YvI3Es8a4UbyIhhj16gSERpY_lgk8S93DhwZA/exec">
      &larr; Back to Tracker
    </a>
  </div>

  <script>
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbxQbfZzReuSn-amJWbroWaMH6TBWBDP0YvI3Es8a4UbyIhhj16gSERpY_lgk8S93DhwZA/exec';
    var currentMeal = 'Breakfast';
    var isRecording = false;
    var mediaRecorder = null;
    var audioChunks = [];
    var recordingTimer = null;
    var secondsElapsed = 0;
    var timerInterval = null;
    var knownFoods = [];
    var currentMatch = null;
    var MAX_SECONDS = 30;

    // Auto-select meal based on time
    (function() {
      var hour = new Date().getHours();
      var meal = 'Snack';
      if (hour < 11) meal = 'Breakfast';
      else if (hour < 15) meal = 'Lunch';
      else if (hour >= 18) meal = 'Dinner';
      document.querySelectorAll('.meal-btn').forEach(function(btn) {
        if (btn.textContent === meal) {
          btn.classList.add('active');
          currentMeal = meal;
        } else {
          btn.classList.remove('active');
        }
      });
    })();

    // Load Known Foods on page load
    (function() {
      fetch(GAS_URL + '?action=knownfoods', { redirect: 'follow', mode: 'cors' })
        .then(function(r) { return r.text(); })
        .then(function(data) {
          try {
            knownFoods = JSON.parse(data);
            console.log('Known Foods loaded: ' + knownFoods.length + ' items');
          } catch(e) {
            knownFoods = [];
            console.log('Failed to parse Known Foods: ' + data.substring(0, 100));
          }
        })
        .catch(function(err) {
          knownFoods = [];
          console.log('Failed to load Known Foods: ' + err.message);
        });
    })();

    function selectMeal(btn, meal) {
      document.querySelectorAll('.meal-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      currentMeal = meal;
    }

    // ---- Audio Recording (MediaRecorder API) ----
    function toggleMic() {
      if (isRecording) {
        stopRecording();
      } else {
        startRecording();
      }
    }

    function startRecording() {
      document.getElementById('transcript').value = '';
      document.getElementById('result').innerHTML = '';
      hideMatch();
      setStatus('', '');

      navigator.mediaDevices.getUserMedia({ audio: true })
        .then(function(stream) {
          isRecording = true;
          audioChunks = [];
          secondsElapsed = 0;

          mediaRecorder = new MediaRecorder(stream, { mimeType: getSupportedMimeType() });

          mediaRecorder.ondataavailable = function(event) {
            if (event.data.size > 0) {
              audioChunks.push(event.data);
            }
          };

          mediaRecorder.onstop = function() {
            // Stop all tracks to release mic
            stream.getTracks().forEach(function(track) { track.stop(); });
            processAudio();
          };

          mediaRecorder.start();

          var btn = document.getElementById('mic-btn');
          btn.classList.add('recording');
          btn.innerHTML = '&#9724;';
          updateTimer();
          timerInterval = setInterval(function() {
            secondsElapsed++;
            updateTimer();
            if (secondsElapsed >= MAX_SECONDS) {
              stopRecording();
            }
          }, 1000);
        })
        .catch(function(err) {
          setStatus('Microphone access denied. Please allow microphone.', 'error');
        });
    }

    function stopRecording() {
      if (!isRecording) return;
      isRecording = false;

      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }

      var btn = document.getElementById('mic-btn');
      btn.classList.remove('recording');
      btn.innerHTML = '&#127908;';

      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }

      document.getElementById('timer').textContent = 'Processing audio...';
    }

    function updateTimer() {
      var remaining = MAX_SECONDS - secondsElapsed;
      document.getElementById('timer').textContent = 'Recording... ' + remaining + 's remaining';
    }

    function getSupportedMimeType() {
      var types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/ogg'];
      for (var i = 0; i < types.length; i++) {
        if (MediaRecorder.isTypeSupported(types[i])) return types[i];
      }
      return '';
    }

    // ---- Send Audio to Backend for Whisper Transcription ----
    function processAudio() {
      if (audioChunks.length === 0) {
        setStatus('No audio recorded.', 'error');
        document.getElementById('timer').textContent = 'Tap to start recording (up to 30 sec)';
        return;
      }

      setStatus('<span class="spinner"></span> Transcribing audio...', 'processing');

      var audioBlob = new Blob(audioChunks, { type: getSupportedMimeType() || 'audio/webm' });

      // Convert blob to base64 and send to Apps Script
      var reader = new FileReader();
      reader.onloadend = function() {
        var base64Audio = reader.result.split(',')[1]; // Remove data:audio/... prefix
        var mimeType = audioBlob.type || 'audio/webm';

        fetch(GAS_URL + '?action=transcribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: 'audio=' + encodeURIComponent(base64Audio) + '&mimeType=' + encodeURIComponent(mimeType)
        })
        .then(function(r) { return r.text(); })
        .then(function(data) {
          try {
            var result = JSON.parse(data);
            if (result.error) {
              setStatus('Transcription error: ' + result.error, 'error');
              document.getElementById('timer').textContent = 'Tap to start recording (up to 30 sec)';
              return;
            }
            var transcript = result.transcript || '';
            document.getElementById('transcript').value = transcript;
            document.getElementById('submit-btn').disabled = !transcript;
            document.getElementById('timer').textContent = 'Tap to start recording (up to 30 sec)';
            setStatus('Review the text, edit if needed, then tap Log Food.', 'success');
            checkKnownFoodMatch(transcript);
          } catch(e) {
            setStatus('Error processing response.', 'error');
            document.getElementById('timer').textContent = 'Tap to start recording (up to 30 sec)';
          }
        })
        .catch(function(err) {
          setStatus('Network error: ' + err.message, 'error');
          document.getElementById('timer').textContent = 'Tap to start recording (up to 30 sec)';
        });
      };
      reader.readAsDataURL(audioBlob);
    }

    // ---- Known Food Matching ----
    function onTranscriptChange() {
      var text = document.getElementById('transcript').value.trim();
      document.getElementById('submit-btn').disabled = !text;
      if (text.length >= 3) {
        checkKnownFoodMatch(text);
      } else {
        hideMatch();
      }
    }

    function normalize(text) {
      // Strip all punctuation, extra spaces, articles, and lowercase
      return text.toLowerCase()
        .replace(/[.,!?;:'"()\-\/\\]/g, '')
        .replace(/\b(a|an|the|of|with|and)\b/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function checkKnownFoodMatch(text) {
      if (!knownFoods || knownFoods.length === 0) {
        hideMatch();
        return;
      }

      var query = normalize(text);
      if (query.length < 3) { hideMatch(); return; }

      var bestMatch = null;
      var bestScore = 0;

      knownFoods.forEach(function(food) {
        var name = normalize(food.name);
        if (!name) return;

        var score = 0;

        // Exact match after normalization
        if (name === query) {
          score = 1000;
        }
        // Query contains the full food name
        else if (query.indexOf(name) !== -1) {
          score = 500 + name.length; // Longer name = better match
        }
        // Food name contains the full query
        else if (name.indexOf(query) !== -1 && query.length >= 4) {
          score = 400 + query.length;
        }
        // Word overlap — count how many significant words match
        else {
          var queryWords = query.split(' ').filter(function(w) { return w.length > 2; });
          var nameWords = name.split(' ').filter(function(w) { return w.length > 2; });
          var matchCount = 0;
          queryWords.forEach(function(qw) {
            nameWords.forEach(function(nw) {
              if (qw === nw || qw.indexOf(nw) !== -1 || nw.indexOf(qw) !== -1) matchCount++;
            });
          });
          if (matchCount > 0 && nameWords.length > 0) {
            var coverage = matchCount / Math.max(queryWords.length, nameWords.length);
            if (coverage >= 0.5) {
              score = Math.round(coverage * 300) + name.length; // Prefer longer/combo entries
            }
          }
        }

        if (score > bestScore) {
          bestMatch = food;
          bestScore = score;
        }
      });

      if (bestMatch && bestScore >= 200) {
        currentMatch = bestMatch;
        document.getElementById('match-name').textContent = bestMatch.name;
        document.getElementById('match-cal').textContent = bestMatch.calories + ' kcal';
        document.getElementById('match-banner').style.display = 'block';
      } else {
        hideMatch();
      }
    }

    function hideMatch() {
      currentMatch = null;
      document.getElementById('match-banner').style.display = 'none';
    }

    function useMatch() {
      if (!currentMatch) return;
      document.getElementById('submit-btn').disabled = true;
      hideMatch();
      setStatus('<span class="spinner"></span> Logging from saved data...', 'processing');

      var deviceType = /Mobi|Android/i.test(navigator.userAgent) ? 'mobile' : 'desktop';
      var url = GAS_URL + '?action=quicklog'
        + '&name=' + encodeURIComponent(currentMatch.name)
        + '&quantity=' + encodeURIComponent(currentMatch.quantity)
        + '&calories=' + encodeURIComponent(currentMatch.calories)
        + '&protein_g=' + encodeURIComponent(currentMatch.protein_g)
        + '&carbs_g=' + encodeURIComponent(currentMatch.carbs_g)
        + '&fat_g=' + encodeURIComponent(currentMatch.fat_g)
        + '&meal=' + encodeURIComponent(currentMeal)
        + '&device=' + deviceType;

      fetch(url, { redirect: 'follow', mode: 'cors' })
        .then(function(r) { return r.text(); })
        .then(function(data) {
          setStatus('Logged: ' + currentMatch.name + ' (from saved data)', 'success');
          try { showResult(JSON.parse(data)); } catch(e) {}
          setTimeout(resetInput, 3000);
        })
        .catch(function(err) {
          window.open(url, '_blank');
          setStatus('Logging... Check tracker in a moment.', 'processing');
          setTimeout(resetInput, 3000);
        });
    }

    // ---- Submit (Claude parsing) ----
    function submitVoice() {
      var text = document.getElementById('transcript').value.trim();
      if (!text) return;

      document.getElementById('submit-btn').disabled = true;
      hideMatch();
      setStatus('<span class="spinner"></span> Analyzing with AI...', 'processing');

      var deviceType = /Mobi|Android/i.test(navigator.userAgent) ? 'mobile' : 'desktop';
      var url = GAS_URL + '?action=voice&text=' + encodeURIComponent(text) + '&meal=' + encodeURIComponent(currentMeal) + '&device=' + deviceType;

      fetch(url, { redirect: 'follow', mode: 'cors' })
        .then(function(r) { return r.text(); })
        .then(function(data) {
          try {
            var result = JSON.parse(data);
            if (result.error) {
              setStatus('Error: ' + result.error, 'error');
              document.getElementById('submit-btn').disabled = false;
              return;
            }
            setStatus('Logged successfully!', 'success');
            showResult(result);
            setTimeout(resetInput, 3000);
          } catch(e) {
            setStatus('Logged! Return to tracker to see details.', 'success');
            setTimeout(resetInput, 3000);
          }
        })
        .catch(function(err) {
          window.open(url, '_blank');
          setStatus('Logging... Check tracker in a moment.', 'processing');
          setTimeout(resetInput, 5000);
        });
    }

    function resetInput() {
      document.getElementById('transcript').value = '';
      document.getElementById('submit-btn').disabled = true;
      hideMatch();
    }

    function showResult(summary) {
      var html = '<div class="result-items">';
      if (summary.meals && summary.meals.length > 0) {
        var lastItem = summary.meals[summary.meals.length - 1];
        html += '<div class="result-item"><span><strong>' + lastItem.name + '</strong></span><span class="cal">' + lastItem.calories + ' kcal</span></div>';
        if (lastItem.items && lastItem.items.length > 1) {
          lastItem.items.forEach(function(sub) {
            html += '<div class="result-item" style="font-size:12px;background:#f8faf8;"><span style="padding-left:8px;">' + sub.name + ' (' + sub.quantity + ')</span><span class="cal" style="font-size:12px;">' + sub.calories + ' kcal</span></div>';
          });
        }
      }
      html += '<div style="margin-top:8px;font-size:13px;color:#555;">Today: <strong>' + summary.caloriesIn + ' kcal</strong> eaten</div>';
      html += '</div>';
      document.getElementById('result').innerHTML = html;
    }

    function setStatus(msg, cls) {
      var el = document.getElementById('status');
      el.innerHTML = msg;
      el.className = 'status' + (cls ? ' ' + cls : '');
    }
  </script>
</body>
</html>
