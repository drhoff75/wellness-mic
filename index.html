<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wellness Tracker - Voice Input</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 { font-size: 20px; margin-bottom: 16px; color: #1a1a2e; }

    .meal-selector { display: flex; gap: 4px; margin-bottom: 16px; }
    .meal-btn {
      flex: 1; padding: 8px 2px; border: 2px solid #e8ecf1; border-radius: 8px;
      background: white; font-size: 12px; font-weight: 500; cursor: pointer; color: #555;
    }
    .meal-btn.active { background: #3b82f6; border-color: #3b82f6; color: white; }

    .mic-btn {
      width: 80px; height: 80px; border-radius: 50%; border: none; background: #3b82f6;
      color: white; font-size: 32px; cursor: pointer; margin: 16px auto;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .mic-btn.recording { background: #ef4444; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

    .transcript-area {
      margin: 12px 0;
      position: relative;
    }
    .transcript-input {
      width: 100%;
      min-height: 48px;
      padding: 12px;
      background: #f8f9fb;
      border: 2px solid #e8ecf1;
      border-radius: 10px;
      font-size: 16px;
      color: #333;
      text-align: left;
      resize: vertical;
      font-family: inherit;
      outline: none;
    }
    .transcript-input:focus { border-color: #3b82f6; }
    .transcript-input::placeholder { color: #aaa; text-align: center; }

    .match-banner {
      display: none;
      padding: 8px 12px;
      background: #f0fdf4;
      border: 2px solid #22c55e;
      border-radius: 8px;
      margin: 8px 0;
      text-align: left;
      font-size: 14px;
      cursor: pointer;
    }
    .match-banner .match-name { font-weight: 600; }
    .match-banner .match-cal { color: #22c55e; font-weight: 600; float: right; }
    .match-banner .match-hint { font-size: 11px; color: #888; display: block; margin-top: 2px; }

    .status { font-size: 13px; min-height: 20px; margin: 8px 0; }
    .status.processing { color: #3b82f6; }
    .status.error { color: #ef4444; }
    .status.success { color: #22c55e; }

    .btn-submit {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      background: #22c55e; color: white; font-size: 16px; font-weight: 600;
      cursor: pointer; margin-top: 8px;
    }
    .btn-submit:hover { background: #16a34a; }
    .btn-submit:disabled { background: #ccc; cursor: not-allowed; }

    .btn-back {
      display: inline-block; margin-top: 16px; color: #3b82f6;
      text-decoration: none; font-size: 14px;
    }

    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid #e8ecf1; border-top-color: #3b82f6;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .result-items { text-align: left; margin-top: 12px; }
    .result-item {
      padding: 8px 10px; background: #f0fdf4; border-radius: 8px;
      margin-bottom: 4px; display: flex; justify-content: space-between; font-size: 14px;
    }
    .result-item .cal { color: #22c55e; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Voice Input</h1>

    <div class="meal-selector">
      <button class="meal-btn active" onclick="selectMeal(this, 'Breakfast')">Breakfast</button>
      <button class="meal-btn" onclick="selectMeal(this, 'Lunch')">Lunch</button>
      <button class="meal-btn" onclick="selectMeal(this, 'Snack')">Snack</button>
      <button class="meal-btn" onclick="selectMeal(this, 'Dinner')">Dinner</button>
    </div>

    <button class="mic-btn" id="mic-btn" onclick="toggleMic()">&#127908;</button>
    <div style="font-size:12px;color:#888;">Tap to start / stop</div>

    <div class="transcript-area">
      <textarea class="transcript-input" id="transcript" placeholder="Tap the mic and speak, or type here..." rows="2" oninput="onTranscriptChange()"></textarea>
    </div>

    <!-- Known Food match banner -->
    <div class="match-banner" id="match-banner" onclick="useMatch()">
      <span class="match-name" id="match-name"></span>
      <span class="match-cal" id="match-cal"></span>
      <span class="match-hint">Tap to use this (no API cost)</span>
    </div>

    <div class="status" id="status"></div>

    <button class="btn-submit" id="submit-btn" onclick="submitVoice()" disabled>Log Food</button>

    <div id="result"></div>

    <a class="btn-back" href="https://script.google.com/macros/s/AKfycbxQbfZzReuSn-amJWbroWaMH6TBWBDP0YvI3Es8a4UbyIhhj16gSERpY_lgk8S93DhwZA/exec">
      &larr; Back to Tracker
    </a>
  </div>

  <script>
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbxQbfZzReuSn-amJWbroWaMH6TBWBDP0YvI3Es8a4UbyIhhj16gSERpY_lgk8S93DhwZA/exec';
    var currentMeal = 'Breakfast';
    var isRecording = false;
    var recognition = null;
    var recordingTimeout = null;
    var knownFoods = [];
    var currentMatch = null;

    // Auto-select meal based on time
    (function() {
      var hour = new Date().getHours();
      var meal = 'Snack';
      if (hour < 11) meal = 'Breakfast';
      else if (hour < 15) meal = 'Lunch';
      else if (hour >= 18) meal = 'Dinner';
      document.querySelectorAll('.meal-btn').forEach(function(btn) {
        if (btn.textContent === meal) {
          btn.classList.add('active');
          currentMeal = meal;
        } else {
          btn.classList.remove('active');
        }
      });
    })();

    // Load Known Foods on page load for autocomplete matching
    (function() {
      fetch(GAS_URL + '?action=knownfoods', { redirect: 'follow', mode: 'cors' })
        .then(function(r) { return r.text(); })
        .then(function(data) {
          try { knownFoods = JSON.parse(data); } catch(e) { knownFoods = []; }
        })
        .catch(function() { knownFoods = []; });
    })();

    function selectMeal(btn, meal) {
      document.querySelectorAll('.meal-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      currentMeal = meal;
    }

    // ---- Speech Recognition ----
    var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      recognition.continuous = true;
      recognition.interimResults = true;

      // Track finalized segments to avoid duplication
      var finalizedSegments = [];

      recognition.onresult = function(event) {
        // Rebuild transcript from all results
        var finalText = '';
        var interimText = '';
        for (var i = 0; i < event.results.length; i++) {
          if (event.results[i].isFinal) {
            finalText += event.results[i][0].transcript + ' ';
          } else {
            interimText += event.results[i][0].transcript;
          }
        }
        document.getElementById('transcript').value = (finalText + interimText).trim();
        document.getElementById('submit-btn').disabled = false;
        checkKnownFoodMatch((finalText + interimText).trim());
      };

      recognition.onerror = function(event) {
        if (event.error !== 'no-speech') {
          setStatus('Error: ' + event.error, 'error');
        }
        stopMic();
      };

      recognition.onend = function() {
        // Don't restart — let it end when user pauses
        if (isRecording) {
          stopMic();
        }
        var text = document.getElementById('transcript').value.trim();
        if (text) checkKnownFoodMatch(text);
      };
    } else {
      document.getElementById('mic-btn').style.display = 'none';
      setStatus('Speech recognition not supported in this browser.', 'error');
    }

    function toggleMic() {
      if (isRecording) {
        try { recognition.stop(); } catch(e) {}
        stopMic();
      } else {
        startMic();
      }
    }

    function startMic() {
      isRecording = true;
      document.getElementById('transcript').value = '';
      document.getElementById('result').innerHTML = '';
      hideMatch();
      var btn = document.getElementById('mic-btn');
      btn.classList.add('recording');
      btn.innerHTML = '&#9724;';
      setStatus('Listening... Tap to stop.', 'processing');

      try {
        recognition.start();
      } catch(e) {
        setStatus('Could not start mic: ' + e.message, 'error');
        stopMic();
        return;
      }

      // Auto-stop after 30 seconds
      recordingTimeout = setTimeout(function() {
        if (isRecording) {
          try { recognition.stop(); } catch(e) {}
          stopMic();
        }
      }, 30000);
    }

    function stopMic() {
      isRecording = false;
      if (recordingTimeout) { clearTimeout(recordingTimeout); recordingTimeout = null; }
      var btn = document.getElementById('mic-btn');
      btn.classList.remove('recording');
      btn.innerHTML = '&#127908;';

      var text = document.getElementById('transcript').value.trim();
      if (text) {
        setStatus('Review the text, then tap Log Food.', 'success');
        document.getElementById('submit-btn').disabled = false;
      } else {
        setStatus('', '');
      }
    }

    // ---- Known Food Matching ----
    function onTranscriptChange() {
      var text = document.getElementById('transcript').value.trim();
      document.getElementById('submit-btn').disabled = !text;
      if (text.length >= 3) {
        checkKnownFoodMatch(text);
      } else {
        hideMatch();
      }
    }

    function checkKnownFoodMatch(text) {
      if (!knownFoods || knownFoods.length === 0) return;
      var query = text.toLowerCase().trim();

      // Find best match — exact or close substring match
      var bestMatch = null;
      var bestScore = 0;

      knownFoods.forEach(function(food) {
        var name = food.name.toLowerCase();
        // Exact match
        if (name === query || query === name) {
          bestMatch = food;
          bestScore = 100;
          return;
        }
        // Check if query contains the food name or vice versa
        if (query.indexOf(name) !== -1 && name.length > bestScore) {
          bestMatch = food;
          bestScore = name.length;
        }
        if (name.indexOf(query) !== -1 && query.length > 5 && query.length > bestScore) {
          bestMatch = food;
          bestScore = query.length;
        }
      });

      if (bestMatch && bestScore >= 5) {
        currentMatch = bestMatch;
        document.getElementById('match-name').textContent = bestMatch.name;
        document.getElementById('match-cal').textContent = bestMatch.calories + ' kcal';
        document.getElementById('match-banner').style.display = 'block';
      } else {
        hideMatch();
      }
    }

    function hideMatch() {
      currentMatch = null;
      document.getElementById('match-banner').style.display = 'none';
    }

    function useMatch() {
      if (!currentMatch) return;

      document.getElementById('submit-btn').disabled = true;
      hideMatch();
      setStatus('<span class="spinner"></span> Logging from saved data...', 'processing');

      // Use the known food directly — no Claude API call
      var deviceType = /Mobi|Android/i.test(navigator.userAgent) ? 'mobile' : 'desktop';
      var url = GAS_URL + '?action=quicklog'
        + '&name=' + encodeURIComponent(currentMatch.name)
        + '&quantity=' + encodeURIComponent(currentMatch.quantity)
        + '&calories=' + encodeURIComponent(currentMatch.calories)
        + '&protein_g=' + encodeURIComponent(currentMatch.protein_g)
        + '&carbs_g=' + encodeURIComponent(currentMatch.carbs_g)
        + '&fat_g=' + encodeURIComponent(currentMatch.fat_g)
        + '&meal=' + encodeURIComponent(currentMeal)
        + '&device=' + deviceType;

      fetch(url, { redirect: 'follow', mode: 'cors' })
        .then(function(r) { return r.text(); })
        .then(function(data) {
          setStatus('Logged: ' + currentMatch.name + ' (from saved data — $0 cost)', 'success');
          try {
            var result = JSON.parse(data);
            showResult(result);
          } catch(e) {}
          resetInput();
        })
        .catch(function(err) {
          window.open(url, '_blank');
          setStatus('Logging... Check tracker in a moment.', 'processing');
          setTimeout(resetInput, 3000);
        });
    }

    // ---- Submit Voice (Claude parsing) ----
    function submitVoice() {
      var text = document.getElementById('transcript').value.trim();
      if (!text) return;

      document.getElementById('submit-btn').disabled = true;
      if (isRecording) {
        try { recognition.stop(); } catch(e) {}
        stopMic();
      }
      hideMatch();
      setStatus('<span class="spinner"></span> Sending to AI...', 'processing');

      var deviceType = /Mobi|Android/i.test(navigator.userAgent) ? 'mobile' : 'desktop';
      var url = GAS_URL + '?action=voice&text=' + encodeURIComponent(text) + '&meal=' + encodeURIComponent(currentMeal) + '&device=' + deviceType;

      fetch(url, { redirect: 'follow', mode: 'cors' })
        .then(function(r) { return r.text(); })
        .then(function(data) {
          try {
            var result = JSON.parse(data);
            if (result.error) {
              setStatus('Error: ' + result.error, 'error');
              document.getElementById('submit-btn').disabled = false;
              return;
            }
            setStatus('Logged successfully!', 'success');
            showResult(result);
            setTimeout(resetInput, 3000);
          } catch(e) {
            setStatus('Logged! Return to tracker to see details.', 'success');
            setTimeout(resetInput, 3000);
          }
        })
        .catch(function(err) {
          window.open(url, '_blank');
          setStatus('Logging... Check tracker in a moment.', 'processing');
          setTimeout(resetInput, 5000);
        });
    }

    function resetInput() {
      document.getElementById('transcript').value = '';
      document.getElementById('submit-btn').disabled = true;
      hideMatch();
    }

    function showResult(summary) {
      var html = '<div class="result-items">';
      if (summary.meals && summary.meals.length > 0) {
        var lastItem = summary.meals[summary.meals.length - 1];
        html += '<div class="result-item"><span><strong>' + lastItem.name + '</strong></span><span class="cal">' + lastItem.calories + ' kcal</span></div>';
        if (lastItem.items && lastItem.items.length > 1) {
          lastItem.items.forEach(function(sub) {
            html += '<div class="result-item" style="font-size:12px;background:#f8faf8;"><span style="padding-left:8px;">' + sub.name + ' (' + sub.quantity + ')</span><span class="cal" style="font-size:12px;">' + sub.calories + ' kcal</span></div>';
          });
        }
      }
      html += '<div style="margin-top:8px;font-size:13px;color:#555;">Today: <strong>' + summary.caloriesIn + ' kcal</strong> eaten</div>';
      html += '</div>';
      document.getElementById('result').innerHTML = html;
    }

    function setStatus(msg, cls) {
      var el = document.getElementById('status');
      el.innerHTML = msg;
      el.className = 'status' + (cls ? ' ' + cls : '');
    }
  </script>
</body>
</html>
